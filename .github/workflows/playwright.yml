name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start backend
        run: |
          docker compose -f compose.e2e.yml build
          docker compose -f compose.e2e.yml up -d

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:8000/api/event-types > /dev/null; do sleep 2; done'
          echo "Backend ready."

      - name: Run Playwright tests
        run: make e2e

      - name: Print backend logs
        if: failure()
        run: docker compose -f compose.e2e.yml logs backend

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Teardown
        if: always()
        run: docker compose -f compose.e2e.yml down -v
